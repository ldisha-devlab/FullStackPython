<!DOCTYPE html>
<html>
<head>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>
<body class="p-4">

  <h1>Bootstrap Quick-start</h1>
  <p>No CSS file needed. Just use Bootstrap class names!</p>

  <hr>

 
  <h3>Buttons</h3>
  <button class="btn btn-primary">Primary</button>
  <button class="btn btn-danger">Danger</button>
  <button class="btn btn-success">Success</button>

  <hr>

  <h3>Alert</h3>
  <div class="alert alert-warning">This is a warning!</div>

  <hr>

  <h3>Grid (3 Columns)</h3>
  <div class="row">
    <div class="col bg-primary text-white p-3">Col 1</div>
    <div class="col bg-danger text-white p-3">Col 2</div>
    <div class="col bg-success text-white p-3">Col 3</div>
  </div>

  <hr>

  
  <h3>Card</h3>
  <div class="card" style="width: 300px;">
    <div class="card-body">
      <h5 class="card-title">Card Title</h5>
      <p class="card-text">This is a Bootstrap card.</p>
      <button class="btn btn-primary">Click</button>
    </div>
  </div>
  <h2>DOM</h2>
        <p id="text">Original Text</p>
      
        <button onclick="changeText()">Change Text</button>
        <h1 id="title">Hello</h1>
        <h2>Event</h2>
        <button id="clickBtn">Click Me</button>
        <p id="msg"></p>
        <script>
        let heading=document.getElementById("title")
        heading.innerText="welcome Student"
        document.getElementById("clickBtn").addEventListener("click", function(){
        document.getElementById("msg").innerText="Button Clicked!";
        });
        function changeText() {
            document.getElementById("text").innerText = "Text Changed!";
        }
        </script>
        
    </main>
</body>
</html>
